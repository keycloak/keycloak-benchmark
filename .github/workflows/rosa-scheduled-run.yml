name: ROSA Scheduled Run

on:
  schedule:
    - cron: '0 5 * * 1' # Runs At 05:00 UTC on Monday.
  workflow_dispatch:
    inputs:
      clusterPrefix:
        description: 'The ROSA cluster prefix.'
        type: string

jobs:
  meta:
    name: Metadata
    runs-on: ubuntu-latest
    outputs:
      clusterPrefix: ${{ steps.cluster.outputs.CLUSTER_PREFIX }}
    steps:
      - name: Compute Cluster Info
        id: cluster
        run: |
          CLUSTER_PREFIX=${{ inputs.clusterPrefix || format('gh-{0}', github.repository_owner) }}
          echo "CLUSTER_PREFIX=${CLUSTER_PREFIX}" >> ${GITHUB_OUTPUT}

  rosa-multi-az-clusters-run-tests:
    name: Multi-AZ Clusters - Run Tests
    needs: meta
    if: github.event_name != 'schedule' || github.repository == 'keycloak/keycloak-benchmark'
    uses: ./.github/workflows/rosa-multi-az-clusters-run-tests.yml
    secrets: inherit
    with:
      clusterPrefix: ${{ needs.meta.outputs.clusterPrefix }}
      usersPerRealm: 1000000
      uniqueCredentials: 100000

  rosa-stretched-cluster:
    name: Stretched Cluster - Create
    needs: meta
    if: github.event_name != 'schedule' || github.repository == 'keycloak/keycloak-benchmark'
    uses: ./.github/workflows/rosa-stretched-cluster.yml
    secrets: inherit
    with:
      clusterName: "${{ needs.meta.outputs.clusterPrefix }}-az"

  rosa-stretched-cluster-benchmark:
    name: Stretched Cluster - Benchmark
    needs:
      - meta
      - rosa-stretched-cluster
    if: github.event_name != 'schedule' || github.repository == 'keycloak/keycloak-benchmark'
    uses: ./.github/workflows/rosa-single-cluster-benchmark.yml
    secrets: inherit
    with:
      clusterName: "${{ needs.meta.outputs.clusterPrefix }}-az"
      outputArchiveSuffix: "stretched-cluster"
      clusterIdPrefix: "sc_"
      usersPerRealm: 1000000
      uniqueCredentials: 100000

  check-benchmark-results:
    name: Check Benchmark Results
    if: ${{ always() && (github.event_name != 'schedule' || github.repository == 'keycloak/keycloak-benchmark') }}
    needs:
      - rosa-multi-az-clusters-run-tests
      - rosa-stretched-cluster-benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout result-data branch
        uses: actions/checkout@v6
        with:
          ref: 'result-data'

      - name: Check for non-zero ko values
        shell: bash
        run: |
          DATE_FOLDER=rosa_scalability/$(date +"%Y/%m/%d")
          if [ ! -d "${DATE_FOLDER}" ]; then
            echo "ERROR: Result directory '${DATE_FOLDER}' does not exist."
            exit 1
          fi
          FAILED=false
          for file in "${DATE_FOLDER}"/*.json; do
            [ -e "${file}" ] || continue
            NON_ZERO_KO=$(jq '[.. | objects | select(has("ko")) | .ko | select(. != 0)] | length' "${file}")
            if [ "${NON_ZERO_KO}" -gt 0 ]; then
              echo "FAILURE: ${file} contains ${NON_ZERO_KO} non-zero 'ko' values"
              FAILED=true
            else
              echo "OK: ${file}"
            fi
          done
          if [ "${FAILED}" = true ]; then
            echo "Benchmark failed: non-zero 'ko' values detected."
            exit 1
          fi
          echo "All benchmark results passed."
